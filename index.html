<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor"
      crossorigin="anonymous"
    />
    <script
      src="https://kit.fontawesome.com/cc54662ed1.js"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="src/style.css" />
    <title>Weather App</title>
  </head>

  <body>
    <div class="container">
      <form id="search-city-form">
        <div class="row">
          <div class="col-8">
            <input
              type="search"
              id="search-text-input"
              class="form-control"
              placeholder="Enter a city"
              autofocus="on"
            />
          </div>
          <div class="col-2">
            <input
              type="submit"
              class="btn shadow-sm search-button"
              value="Search"
            />
          </div>
          <div class="col-2">
            <button
              class="btn shadow-sm current-button"
              id="current-location-button"
            >
              Current
            </button>
          </div>
        </div>
      </form>

      <div class="row">
        <div class="col-8">
          <h1>
            <i class="fa-solid fa-location-dot"></i>
            <i id="location">Amsterdam, NL</i>
          </h1>
        </div>
        <div class="col-4 clock">
          <h1>
            <i class="fa-regular fa-clock"></i>
            <i id="current-time"></i>
          </h1>
        </div>
      </div>

      <h2>
        <i class="fa-regular fa-calendar"></i>
        <i id="current-date"></i>
      </h2>

      <h3>
        <i class="fa-solid fa-cloud-sun"></i>
        <i id="temperature">25</i>
        <span id="temperature-metric">
          <a href="#" id="celsius-metric">°C</a>
          |
          <a href="#" id="fahrenheit-metric">°F</a>
        </span>
      </h3>

      <hr />

      <div class="row">
        <div class="col future-days">
          Fri
          <br />
          <i class="fa-solid fa-cloud weather-icon"></i>
          24°
        </div>
        <div class="col future-days">
          Sat
          <br />
          <i class="fa-solid fa-cloud-showers-heavy weather-icon"></i>
          23°
        </div>
        <div class="col future-days">
          Sun
          <br />
          <i class="fa-solid fa-cloud-showers-heavy weather-icon"></i>
          23°
        </div>
        <div class="col future-days">
          Mon
          <br />
          <i class="fa-solid fa-sun weather-icon"></i>
          27°
        </div>
        <div class="col future-days">
          Tue
          <br />
          <i class="fa-solid fa-sun weather-icon"></i>
          27°
        </div>
      </div>
    </div>
    <script src="src/script.js"></script>
  </body>
</html>
