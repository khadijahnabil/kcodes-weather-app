<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor"
      crossorigin="anonymous"
    />
    <script
      src="https://kit.fontawesome.com/cc54662ed1.js"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="src/style.css" />
    <title>Weather App</title>
  </head>

  <body>
    <div class="container">
      <form id="search-city-form">
        <div class="row">
          <div class="col-8">
            <input
              type="search"
              id="search-text-input"
              class="form-control"
              placeholder="Enter a city"
              autofocus="on"
            />
          </div>
          <div class="col-2">
            <input
              type="submit"
              class="btn shadow-sm search-button"
              value="Search"
            />
          </div>
          <div class="col-2">
            <button
              class="btn shadow-sm current-button"
              id="current-location-button"
            >
              Current
            </button>
          </div>
        </div>
      </form>

      <div class="location-title">
        <h1>
          <i class="fa-solid fa-location-dot"></i>
          <i id="location">Amsterdam, NL</i>
        </h1>
      </div>

      <div class="row">
        <div class="col-8 current-date">
          <h2>
            <i class="fa-regular fa-calendar"></i>
            <i id="current-date"></i>
          </h2>
        </div>
        <div class="col-4 clock">
          <h2>
            <div class="time-description">Last updated</div>
            <i class="fa-regular fa-clock"></i>
            <i id="current-time"></i>
          </h2>
        </div>
      </div>

      <div class="row">
        <div class="col-6 weather-temperature">
          <h3>
            <img
              src="http://openweathermap.org/img/wn/01d@2x.png"
              alt=""
              id="icon"
            />
            <i id="temperature">25</i>
            <span id="temperature-metric">
              <a href="#" id="celsius-metric">°C</a>
              |
              <a href="#" id="fahrenheit-metric">°F</a>
            </span>
          </h3>
        </div>
        <div class="col-6 weather-description">
          <ul class="weather-list">
            <li>
              <span>Weather condition:</span>
              <span id="weather-condition">Clear</span>
            </li>
            <li>
              <span>Wind-speed:</span>
              <span id="wind-speed">5</span>
              <span>km/h</span>
            </li>
            <li>
              <span>Humidity:</span>
              <span id="humidity" class="list">63</span>
              <span>%</span>
            </li>
          </ul>
        </div>
      </div>

      <hr />

      <div class="weather-forecast">
        <div class="row">
          <div class="col">
            <div class="weather-forecast-date">Fri</div>
            <i class="fa-solid fa-cloud weather-icon"></i>
            <div class="weather-forecast-temperature">
              <span class="weather-forecast-temperature-min"> 28° </span>
              <span class="weather-forecast-temperature-max"> 28° </span>
            </div>
          </div>
          <div class="col">
            <div class="weather-forecast-date">Sat</div>
            <i class="fa-solid fa-cloud-showers-heavy weather-icon"></i>
            <div class="weather-forecast-temperature">
              <span class="weather-forecast-temperature-min"> 28° </span>
              <span class="weather-forecast-temperature-max"> 28° </span>
            </div>
          </div>
          <div class="col">
            <div class="weather-forecast-date">Sun</div>
            <i class="fa-solid fa-cloud-showers-heavy weather-icon"></i>
            <div class="weather-forecast-temperature">
              <span class="weather-forecast-temperature-min"> 28° </span>
              <span class="weather-forecast-temperature-max"> 28° </span>
            </div>
          </div>
          <div class="col">
            <div class="weather-forecast-date">Mon</div>
            <i class="fa-solid fa-sun weather-icon"></i>
            <div class="weather-forecast-temperature">
              <span class="weather-forecast-temperature-min"> 28° </span>
              <span class="weather-forecast-temperature-max"> 28° </span>
            </div>
          </div>
          <div class="col">
            <div class="weather-forecast-date">Tue</div>
            <i class="fa-solid fa-sun weather-icon"></i>
            <div class="weather-forecast-temperature">
              <span class="weather-forecast-temperature-min"> 28° </span>
              <span class="weather-forecast-temperature-max"> 28° </span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="github-source-code">
      <a
        href="https://github.com/khadijahnabil/shecodes-weather-app"
        target="_blank"
        >Open-source code</a
      >
      by Khadijah Nabil
    </div>
    <script src="src/script.js"></script>
  </body>
</html>
